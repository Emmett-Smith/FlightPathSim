<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlightVid &mdash; drone flythrough viewer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="cesiumContainer"></div>

    <div id="panel">
      <h1>FlightVid</h1>

      <label id="dropzone" for="fileInput">
        <span id="dropzoneLabel">Drop a .kml / .kmz flight path, or click to browse</span>
        <input id="fileInput" type="file" accept=".kml,.kmz" hidden />
      </label>

      <div id="status"></div>

      <div id="controls" hidden>
        <div id="progressRow">
          <input id="scrub" type="range" min="0" max="1000" value="0" />
          <span id="timeLabel">0:00 / 0:00</span>
        </div>

        <div id="buttonRow">
          <button id="playBtn">Play</button>
          <button id="resetBtn">Reset</button>
          <label>
            Speed
            <select id="speedSelect">
              <option value="0.5">0.5x</option>
              <option value="1" selected>1x</option>
              <option value="2">2x</option>
              <option value="4">4x</option>
            </select>
          </label>
          <button id="recordBtn">Record flight (.webm)</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
